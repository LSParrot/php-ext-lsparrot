services:
  shell:
    image: ${SHELL_IMAGE:-shell}
    build:
      context: ./
      dockerfile: ./Dockerfile
    # for debugging (gdb, strace, etc.)
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    volumes:
      - .:/workspace:cached
    tty: true
